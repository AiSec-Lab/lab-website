<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — AiSec Lab</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <link rel="icon" type="image/x-icon" href="assets/images/logo/logo.ico" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <div class="brand">
          <div class="brand-mark">
            <img src="assets/images/logo/logo.svg" alt="AiSec Lab logo" />
          </div>
          <div class="brand-text">
            <div class="brand-title">AiSec Lab</div>
            <div class="brand-subtitle"></div>
          </div>
        </div>
        <button class="nav-toggle" aria-label="Toggle navigation">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="#0f1b2d" stroke-width="1.7" />
          </svg>
        </button>
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="news.html">News</a>
          <a href="papers.html">Papers</a>
          <a href="projects.html">Projects</a>
          <a href="people.html">People</a>
          <a href="gallery.html">Gallery</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <h1>Gallery</h1>
          <p>Add photos, figures, or fieldwork shots via <code>data/gallery.json</code>.</p>
        </div>
      </section>

      <section class="container section">
        <div class="panel">
          <div class="pill">Snapshots</div>
          <h2>Images</h2>
          <p class="lead">Point each item to an image path; placeholders use gradients.</p>
          <div class="grid gallery" data-gallery-list></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div>© <span data-year></span> AiSec Lab.</div>
      </div>
    </footer>

    <script src="assets/script.js"></script>
  </body>
</html>
