<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AiSec Lab</title>
    <meta
      name="description"
      content="AiSec Lab — academic research group with news, papers, projects, people, and gallery."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-xh6O/Ck1AhZ1tcHTfb3e8DqRL3OjaxAg/P6MqxsVXniPXTWh05rq6ArtyTcwxgW9"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <link rel="icon" type="image/x-icon" href="assets/images/logo/logo.ico" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-nav">
        <div class="brand">
          <div class="brand-mark">
            <img src="assets/images/logo/logo.svg" alt="AiSec Lab logo" />
          </div>
          <div class="brand-text">
            <div class="brand-title">AiSec Lab</div>
            <div class="brand-subtitle"></div>
          </div>
        </div>
        <button class="nav-toggle" aria-label="Toggle navigation">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="#0f1b2d" stroke-width="1.7" />
          </svg>
        </button>
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="news.html">News</a>
          <a href="papers.html">Papers</a>
          <a href="projects.html">Projects</a>
          <a href="people.html">People</a>
          <a href="gallery.html">Gallery</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <div class="panel terminal-panel">
            <div class="pill">Terminal</div>
            <h2>AiSec Lab</h2>
            <p class="lead">
              AiSec Lab works on security and AI. 
            </p>
            <div class="terminal-window">
              <div class="terminal-output" data-terminal-output aria-live="polite"></div>
              <form class="terminal-form" data-terminal-form>
                <span class="prompt">$</span>
                <input
                  type="text"
                  name="command"
                  autocomplete="off"
                  spellcheck="false"
                  placeholder="Type a command, e.g., news"
                  data-terminal-input
                />
              </form>
            </div>
          </div>
        </div>
      </section>

    </main>

    <footer class="footer">
      <div class="container">
        <div>© <span data-year></span> AiSec Lab.</div>
              </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <script src="assets/script.js"></script>
  </body>
</html>
