<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AiSec Lab Terminal Slideshow</title>
    <meta
      name="description"
      content="Terminal-style slideshow for AiSec Lab and quick recording workflows."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260402-slidesfinal4" />
  </head>
  <body>
    <div class="slideshow-shell">
      <main class="slideshow-main">
        <div class="slideshow-terminal">
          <div class="slideshow-titlebar">
            <div class="slideshow-controls" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="slideshow-title" data-slideshow-title>Loading slides...</div>
          </div>

          <div class="slideshow-window">
            <div class="slideshow-hud">
              <span data-slideshow-counter>00 / 00</span>
            </div>
            <div class="slideshow-output" data-slideshow-output aria-live="polite"></div>
            <div class="slideshow-footer-url">https://aisec-lab.github.io/</div>
          </div>
        </div>
      </main>
    </div>

    <script src="slides.js?v=20260402-slidesfinal4"></script>
    <script src="script.js?v=20260402-slidesfinal4"></script>
  </body>
</html>
